<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>SYSMATE Web Banner Studio</title>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Gothic:wght@400;700;800&family=Montserrat:wght@400;700;900&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --sidebar-width: 320px;
      --accent: #a78bfa;
      --accent-glow: rgba(167, 139, 250, 0.35);
      --bg-app: #0e1016;
      --bg-panel: #161922;
      --bg-elevated: #1e222d;
      --bg-input: #252a38;
      --border: #2f3548;
      --border-subtle: #252a36;
      --text: #e8eaf0;
      --text-muted: #8b93a7;
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-app);
      color: var(--text);
      overflow: hidden;
    }

    #app-header {
      height: 52px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: linear-gradient(90deg, #35c2ff 0%, #6b5cff 55%, #7f3cff 100%);
      color: #fff;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      z-index: 20;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0.2px;
      white-space: nowrap;
      background: rgba(0, 0, 0, 0.18);
      padding: 6px 10px;
      border-radius: 999px;
    }

    .doc-title {
      font-size: 13px;
      opacity: 0.95;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-btn {
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(0, 0, 0, 0.18);
      color: #fff;
      padding: 7px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .header-btn:hover {
      background: rgba(0, 0, 0, 0.26);
    }

    #app-main {
      flex: 1;
      min-height: 0;
      display: flex;
      overflow: hidden;
    }



    #sidebar {
      width: var(--sidebar-width);
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    .tab-content {
      padding: 20px;
      flex: 1;
      overflow-y: auto;
    }

    .tab-content::-webkit-scrollbar {
      width: 8px;
    }

    .tab-content::-webkit-scrollbar-track {
      background: var(--bg-panel);
    }

    .tab-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    h3 {
      font-size: 16px;
      margin-bottom: 15px;
      color: var(--text);
      font-weight: 600;
    }

    .control-item {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-input);
      color: var(--text);
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    input[type="color"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-input);
      cursor: pointer;
      padding: 2px;
    }

    input[type="file"] {
      width: 100%;
      font-size: 12px;
      color: var(--text-muted);
    }

    input[type="file"]::file-selector-button {
      margin-right: 10px;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text);
      cursor: pointer;
    }

    input[type="file"]::file-selector-button:hover {
      background: var(--bg-input);
      border-color: var(--accent);
    }

    .bg-upload-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
    }

    .bg-upload-row .bg-file-input {
      flex: 1;
      min-width: 0;
      width: auto;
    }

    .btn-bg-remove {
      flex-shrink: 0;
      white-space: nowrap;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-elevated);
      color: var(--text-muted);
      cursor: pointer;
    }

    .btn-bg-remove:hover {
      border-color: #c45c5c;
      color: #f0a0a0;
      background: #2c2224;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border-subtle);
      margin: 18px 0;
    }

    .canvas-dims {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .canvas-dims .dim-sep {
      color: var(--text-muted);
      user-select: none;
      font-size: 13px;
    }

    #workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, #1a1f2e 0%, var(--bg-app) 65%);
    }

    #workspace-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      -webkit-overflow-scrolling: touch;
    }

    #canvas-scale-wrap {
      flex-shrink: 0;
    }

    #canvas-wrapper {
      position: relative;
      background: #fff;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.06);
      background-image: url('assets/banner_1.jpg');
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    .movable {
      position: absolute;
      display: flex;
      align-items: flex-start;
      gap: 6px;
      border: 1.5px solid transparent;
      user-select: none;
      cursor: default;
      z-index: 10;
    }

    .movable:hover {
      border: 1.5px dashed var(--accent);
    }

    .movable.selected {
      border: 1.5px solid var(--accent);
    }

    .movable-handle {
      flex-shrink: 0;
      cursor: move;
      user-select: none;
      line-height: 1;
      font-size: 16px;
      color: #888;
      padding: 6px 2px 0 0;
      opacity: 0.45;
      letter-spacing: -2px;
    }

    .movable:hover .movable-handle {
      opacity: 0.95;
      color: #555;
    }

    .banner-text {
      min-width: 100px;
      outline: none;
      line-height: 1.2;
      word-break: keep-all;
      color: #111;
      flex: 1;
      min-height: 1em;
      cursor: text;
      user-select: text;
      -webkit-user-select: text;
    }

    #zoom-bar {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 5;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      max-width: calc(100% - 200px);
    }

    #zoom-bar label {
      margin: 0;
      display: inline;
      font-size: 12px;
    }

    #zoom-range {
      width: 120px;
      accent-color: var(--accent);
    }

    #zoom-label {
      min-width: 40px;
      color: var(--text);
      font-weight: 600;
    }

    .btn-zoom-fit {
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-elevated);
      color: var(--text);
      cursor: pointer;
    }

    .btn-zoom-fit:hover {
      border-color: var(--accent);
      background: #2a3042;
    }

    #save-bar {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      z-index: 5;
    }

    .btn-save {
      background: linear-gradient(145deg, #9b7ff5, var(--accent));
      color: #fff;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-save:hover {
      filter: brightness(1.08);
    }

    .btn-save:active {
      transform: translateY(1px);
    }

    .btn-save-secondary {
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .btn-save-secondary:hover {
      filter: none;
      border-color: var(--accent);
      background: #2a3042;
    }

    .template-btn {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 6px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text);
      cursor: pointer;
      border-radius: 6px;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }

    .template-btn:hover {
      background: #2a3042;
      border-color: var(--accent);
      color: #fff;
    }

    /* 디자인 템플릿 카드 스타일 */
    .template-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 10px;
    }

    .template-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .template-card:hover {
      border-color: var(--accent);
      background: #252a38;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35), 0 0 0 1px var(--accent-glow);
    }

    .template-card.active {
      border-color: var(--accent);
      background: #1e222d;
      box-shadow: 0 0 0 2px var(--accent), 0 4px 15px var(--accent-glow);
    }

    .template-card-preview {
      height: 48px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: -0.3px;
      overflow: hidden;
      user-select: none;
      border: 1px solid rgba(255, 255, 255, 0.05);
      text-align: center;
      padding: 0 6px;
    }

    .template-card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .template-card-desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.3;
    }

    /* 텍스트 박스 모서리 리사이즈 핸들 스타일 */
    .movable .resize-handle {
      display: none;
      position: absolute;
      width: 10px;
      height: 10px;
      background-color: #ffffff;
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
      transition: transform 0.15s ease, background-color 0.15s ease;
    }

    .movable .resize-handle:hover {
      transform: scale(1.25);
      background-color: var(--accent);
    }

    .movable.selected .resize-handle {
      display: block;
    }

    /* 4개 코너 위치 배치 */
    .movable .resize-handle-nw {
      top: -6px;
      left: -6px;
      cursor: nwse-resize;
    }

    .movable .resize-handle-ne {
      top: -6px;
      right: -6px;
      cursor: nesw-resize;
    }

    .movable .resize-handle-sw {
      bottom: -6px;
      left: -6px;
      cursor: nesw-resize;
    }

    .movable .resize-handle-se {
      bottom: -6px;
      right: -6px;
      cursor: nwse-resize;
    }

    /* 사이드 리사이즈 핸들 스타일 (좌우 캡슐형) */
    .movable .resize-handle-w,
    .movable .resize-handle-e {
      width: 6px;
      height: 12px;
      border-radius: 3px;
      top: 50%;
      margin-top: -6px;
    }

    .movable .resize-handle-w {
      left: -4.5px;
      cursor: ew-resize;
    }

    .movable .resize-handle-e {
      right: -4.5px;
      cursor: ew-resize;
    }

    /* 회전 핸들 스타일 */
    .movable .rotate-handle {
      display: none;
      position: absolute;
      bottom: -36px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 24px;
      background-color: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.15);
      border-radius: 50%;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      cursor: grab;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, background-color 0.15s ease;
    }

    .movable.selected .rotate-handle {
      display: flex;
    }

    .movable .rotate-handle:hover {
      transform: translateX(-50%) scale(1.1);
      background-color: #f8f8f8;
    }

    .movable .rotate-handle svg {
      width: 12px;
      height: 12px;
      color: #555;
      display: block;
    }

    /* movable-image 프리미엄 스타일 */
    .movable-image {
      display: block !important;
      padding: 0;
      user-select: none;
      z-index: 1 !important;
    }

    .movable-image img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      object-position: center !important;
      display: block !important;
      pointer-events: none !important;
    }

    .movable-image .movable-handle {
      position: absolute;
      top: 6px;
      left: 6px;
      background: rgba(22, 25, 34, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.15s ease;
      cursor: move;
      display: inline-block;
      white-space: nowrap;
    }

    .movable-image:hover .movable-handle,
    .movable-image.selected .movable-handle {
      opacity: 1;
    }

    /* 배경 이미지 템플릿 프리미엄 스타일 */
    .bg-template-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .bg-preset-card {
      aspect-ratio: 16/9;
      border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bg-preset-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--accent-glow);
    }

    .bg-preset-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent), 0 4px 12px var(--accent-glow);
    }

    .bg-preset-title {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(22, 25, 34, 0.85);
      backdrop-filter: blur(2px);
      color: var(--text);
      font-size: 9px;
      font-weight: 600;
      text-align: center;
      padding: 3px 0;
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bg-preset-delete-btn {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(196, 92, 92, 0.95);
      color: white;
      border: none;
      font-size: 9px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.2s, background-color 0.15s;
      line-height: 1;
    }

    .bg-preset-card:hover .bg-preset-delete-btn {
      opacity: 1;
    }

    .bg-preset-delete-btn:hover {
      background: #ff4d4d;
    }
  </style>
</head>

<body>
  <div id="app-header">
    <div class="header-left">
      <div class="brand">SYSMATE</div>
      <div class="doc-title">배너 디자인</div>
    </div>
    <div class="header-right">
      <button type="button" class="header-btn" id="btn-undo" onclick="undo()" title="실행 취소 (Ctrl + Z)" disabled>↩
        실행취소</button>
      <button type="button" class="header-btn" id="btn-redo" onclick="redo()" title="다시 실행 (Ctrl + Y)" disabled>↪
        다시실행</button>
      <button type="button" class="header-btn" onclick="fitCanvasToView()">맞춤</button>
      <button type="button" class="header-btn" onclick="exportCanvasJPG()">다운로드</button>
    </div>
  </div>

  <div id="app-main">


    <div id="sidebar">
      <div class="tab-content">
        <h3>📏 캔버스 사이즈</h3>
        <div class="control-item" style="margin-bottom: 10px;">
          <label>규격 템플릿</label>
          <select id="canvas-size-preset" style="width: 100%;">
            <option value="1800x250" selected>기본 배너 (1800 × 250)</option>
            <option value="3000x750">대형 배너 (3000 × 750)</option>
            <option value="1920x1080">FHD 가로형 (1920 × 1080)</option>
            <option value="custom">직접 입력 (커스텀)</option>
          </select>
        </div>
        <div class="control-item canvas-dims">
          <input type="number" id="canvas-w" value="1800"><span class="dim-sep">×</span><input type="number"
            id="canvas-h" value="250">
        </div>

        <hr>

        <h3>🖼️ 배경 및 이미지</h3>
        <div class="control-item">
          <label>배경 색상</label>
          <input type="color" id="bg-color" value="#ffffff" style="height: 40px; width: 100%;">
        </div>
        <div class="control-item">
          <label>배경 이미지 업로드</label>
          <div class="bg-upload-row">
            <input type="file" id="bg-upload" class="bg-file-input" accept="image/*">
            <button type="button" class="btn-bg-remove" id="bg-remove" title="업로드한 배경 이미지 제거">배경삭제</button>
          </div>
        </div>
        <div class="control-item" id="bg-opacity-control" style="display: none; margin-top: 10px;">
          <label style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted);">
            <span>배경 이미지 투명도</span>
            <span id="bg-opacity-label" style="font-weight: bold; color: var(--accent);">100%</span>
          </label>
          <input type="range" id="bg-opacity" min="0" max="100" value="100"
            style="width: 100%; accent-color: var(--accent); margin-top: 4px;">
        </div>

        <div class="control-item" style="margin-top: 15px;">
          <label>배경 이미지 템플릿</label>
          <div class="bg-template-grid" id="bg-preset-list">
            <!-- Dynamically rendered stock background templates -->
          </div>

          <div style="display: flex; gap: 8px; margin-top: 10px;">
            <button type="button" class="template-btn"
              style="margin: 0; flex: 1; padding: 7px 4px; font-weight: bold; font-size: 11px; text-align: center;"
              onclick="saveCurrentBgAsTemplate()">💾 현재 배경 저장</button>
            <button type="button" class="btn-bg-remove"
              style="margin: 0; flex: 1; padding: 7px 4px; font-weight: bold; font-size: 11px; text-align: center; height: auto;"
              onclick="clearCustomBgTemplates()">🗑️ 보관함 비우기</button>
          </div>

          <!-- Section for custom-saved backgrounds -->
          <div id="custom-bg-section"
            style="display: none; margin-top: 12px; border-top: 1px dashed var(--border-subtle); padding-top: 8px;">
            <label style="font-size: 11px; color: var(--text-muted); margin-bottom: 6px;">내가 저장한 배경</label>
            <div class="bg-template-grid" id="bg-custom-list">
              <!-- Dynamically rendered custom backgrounds -->
            </div>
          </div>
        </div>

        <div class="control-item">
          <label>폰트 컬러</label>
          <input type="color" id="font-color" value="#111111" style="height: 40px; width: 100%;">
        </div>

        <hr>

        <h3>✍️ 텍스트 추가</h3>
        <div class="control-item">

    <div id="workspace">
      <div id="workspace-scroll">
        <div id="canvas-scale-wrap">

              <div class="banner-text" contenteditable="true" style="font-size: 60px; font-weight: 800;">

        <span id="zoom-label">100%</span>

      <div id="save-bar">

  <script>
    const wrapper = $('#canvas-wrapper');
    const canvasScaleWrap = $('#canvas-scale-wrap');
    let viewZoom = 1;

    // Undo & Redo History System
    let undoStack = [];
    let redoStack = [];
    const MAX_HISTORY = 15;

    function saveState() {
      const state = {
        html: wrapper.html(),
        w: $('#canvas-w').val(),
        h: $('#canvas-h').val(),
        bgColor: $('#bg-color').val(),
        bgImg: wrapper.css('background-image')
      };

      // 중복 상태 저장 방지
      if (undoStack.length > 0) {
        const last = undoStack[undoStack.length - 1];
        if (last.html === state.html && last.w === state.w && last.h === state.h && last.bgColor === state.bgColor && last.bgImg === state.bgImg) {
          return;
        }
      }

      undoStack.push(state);
      if (undoStack.length > MAX_HISTORY) {
        undoStack.shift();
      }

      redoStack = [];
      updateUndoRedoButtons();
    }

    function loadState(state) {
      if (!state) return;

      $('#canvas-w').val(state.w);
      $('#canvas-h').val(state.h);
      $('#bg-color').val(state.bgColor);

      wrapper.css({
        width: state.w + 'px',
        height: state.h + 'px',
        backgroundColor: state.bgColor,
        backgroundImage: state.bgImg
      });

      wrapper.html(state.html);

      // 투명도 조절 슬라이더 동기화
      const $img = wrapper.find('.movable-image-src, .movable-image img');
      if ($img.length) {
        const op = parseFloat($img.css('opacity'));
        const opVal = Number.isFinite(op) ? Math.round(op * 100) : 100;
        $('#bg-opacity').val(opVal);
        $('#bg-opacity-label').text(opVal + '%');
        $('#bg-opacity-control').show();
      } else {
        $('#bg-opacity-control').hide();
      }

      makeMovable();
      fitCanvasToView();
      syncFontUIFromSelection();
      updateUndoRedoButtons();
    }

    function undo() {
      if (undoStack.length <= 1) return;

      const currentState = {
        html: wrapper.html(),
        w: $('#canvas-w').val(),
        h: $('#canvas-h').val(),
        bgColor: $('#bg-color').val(),
        bgImg: wrapper.css('background-image')
      };
      redoStack.push(currentState);

      undoStack.pop();
      const prevState = undoStack[undoStack.length - 1];
      loadState(prevState);
    }

    function redo() {
      if (redoStack.length === 0) return;

      const nextState = redoStack.pop();
      const currentState = {
        html: wrapper.html(),
        w: $('#canvas-w').val(),
        h: $('#canvas-h').val(),
        bgColor: $('#bg-color').val(),
        bgImg: wrapper.css('background-image')
      };
      undoStack.push(currentState);

      loadState(nextState);
    }

    function updateUndoRedoButtons() {
      $('#btn-undo').prop('disabled', undoStack.length <= 1);
      $('#btn-redo').prop('disabled', redoStack.length === 0);
    }

    // 💾 디자인 저장/불러오기 매니저
    const LOCAL_STORAGE_KEY = 'sysmate_banner_saved_designs';

    // 1. JSON 파일 내보내기 (Export as JSON File)
    function exportDesignJSON() {
      const state = {
        html: wrapper.html(),
        w: $('#canvas-w').val(),
        h: $('#canvas-h').val(),
        bgColor: $('#bg-color').val(),
        bgImg: wrapper.css('background-image'),
        version: '1.0'
      };
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
      const downloadAnchor = document.createElement('a');
      const fileName = `sysmate_design_${state.w}x${state.h}_${new Date().toISOString().slice(0, 10)}.json`;
      downloadAnchor.setAttribute("href", dataStr);
      downloadAnchor.setAttribute("download", fileName);
      document.body.appendChild(downloadAnchor);
      downloadAnchor.click();
      downloadAnchor.remove();
    }

    // 2. JSON 파일 가져오기 (Import from JSON File)
    function importDesignJSON(input) {
      const file = input.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          const state = JSON.parse(e.target.result);
          if (!state.html || !state.w || !state.h) {
            alert('유효하지 않은 디자인 파일 형식입니다.');
            return;
          }
          loadState(state);
          saveState(); // 불러온 상태 히스토리에 기재
          alert('디자인 파일을 성공적으로 불러왔습니다!');
        } catch (err) {
          console.error(err);
          alert('디자인 파일을 해석하는 도중 오류가 발생했습니다.');
        }
        // 파일 인풋 초기화
        $(input).val('');
      };
      reader.readAsText(file);
    }

    // 3. 브라우저 로컬 저장소에 저장 (Save to LocalStorage)
    function saveDesignLocal() {
      let name = $('#save-slot-name').val().trim();
      if (!name) {
        const now = new Date();
        name = `마이 디자인 (${now.getMonth() + 1}월 ${now.getDate()}일 ${now.getHours()}시 ${now.getMinutes()}분)`;
      }

      const state = {
        name: name,
        html: wrapper.html(),
        w: $('#canvas-w').val(),
        h: $('#canvas-h').val(),
        bgColor: $('#bg-color').val(),
        bgImg: wrapper.css('background-image'),
        timestamp: Date.now()
      };

      let savedDesigns = [];
      try {
        const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
        if (raw) savedDesigns = JSON.parse(raw);
      } catch (err) {
        console.error(err);
      }

      // 동일한 이름이 있으면 덮어씁니다.
      const existingIndex = savedDesigns.findIndex(d => d.name === name);
      if (existingIndex > -1) {
        savedDesigns[existingIndex] = state;
      } else {
        savedDesigns.push(state);
      }

      localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(savedDesigns));
      $('#save-slot-name').val('');
      updateLocalSavedList();
      alert(`"${name}" 디자인이 브라우저 보관함에 안전하게 저장되었습니다!`);
    }

    // 4. 저장된 목록 갱신 (Update Saved List in UI)
    function updateLocalSavedList() {
      const $select = $('#local-saved-designs');
      $select.empty();

      let savedDesigns = [];
      try {
        const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
        if (raw) savedDesigns = JSON.parse(raw);
      } catch (err) {
        console.error(err);
      }

      if (savedDesigns.length === 0) {
        $select.append('<option value="">-- 저장된 디자인이 없습니다 --</option>');
        return;
      }

      // 최근 저장된 순서대로 정렬
      savedDesigns.sort((a, b) => b.timestamp - a.timestamp);

      savedDesigns.forEach(d => {
        const dateStr = new Date(d.timestamp).toLocaleString('ko-KR', { hour12: false });
        $select.append(`<option value="${d.timestamp}">${d.name} (${d.w}×${d.h})</option>`);
      });
    }

    // 5. 로컬 저장소에서 불러오기 (Load from LocalStorage)
    function loadDesignLocal() {
      const selectedTimestamp = $('#local-saved-designs').val();
      if (!selectedTimestamp) {
        alert('불러올 디자인을 선택해 주세요.');
        return;
      }

      let savedDesigns = [];
      try {
        const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
        if (raw) savedDesigns = JSON.parse(raw);
      } catch (err) {
        console.error(err);
      }

      const state = savedDesigns.find(d => d.timestamp.toString() === selectedTimestamp);
      if (!state) {
        alert('해당 디자인 데이터를 찾을 수 없습니다.');
        return;
      }

      loadState(state);
      saveState(); // 불러온 상태 히스토리에 기재
      alert(`"${state.name}" 디자인을 불러왔습니다!`);
    }

    // 6. 로컬 저장소에서 디자인 삭제 (Delete from LocalStorage)
    function deleteDesignLocal() {
      const selectedTimestamp = $('#local-saved-designs').val();
      if (!selectedTimestamp) {
        alert('삭제할 디자인을 선택해 주세요.');
        return;
      }

      let savedDesigns = [];
      try {
        const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
        if (raw) savedDesigns = JSON.parse(raw);
      } catch (err) {
        console.error(err);
      }

      const index = savedDesigns.findIndex(d => d.timestamp.toString() === selectedTimestamp);
      if (index === -1) return;

      const name = savedDesigns[index].name;
      if (!confirm(`"${name}" 디자인을 보관함에서 삭제하시겠습니까?`)) return;

      savedDesigns.splice(index, 1);
      localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(savedDesigns));
      updateLocalSavedList();
      alert('삭제가 완료되었습니다.');
    }

    function applyViewZoom(z) {
      viewZoom = Math.max(0.05, Math.min(2, z));
      canvasScaleWrap.css('zoom', viewZoom);
      $('#zoom-range').val(Math.round(viewZoom * 100));
      $('#zoom-label').text(Math.round(viewZoom * 100) + '%');
    }

    function fitCanvasToView() {
      const w = parseInt($('#canvas-w').val(), 10) || 1280;
      const h = parseInt($('#canvas-h').val(), 10) || 720;
      const el = document.getElementById('workspace-scroll');
      if (!el) return;
      const pad = 48;
      const rw = (el.clientWidth - pad) / w;
      const rh = (el.clientHeight - pad) / h;
      const fit = Math.min(rw, rh, 1);
      applyViewZoom(Math.max(0.05, fit));
      requestAnimationFrame(scrollStageToCenter);
    }

    function scrollStageToCenter() {
      const sc = document.getElementById('workspace-scroll');
      if (!sc) return;
      const maxL = Math.max(0, sc.scrollWidth - sc.clientWidth);
      const maxT = Math.max(0, sc.scrollHeight - sc.clientHeight);
      sc.scrollLeft = maxL / 2;
      sc.scrollTop = maxT / 2;
    }

    $('#zoom-range').on('input', function () {
      applyViewZoom(parseInt($(this).val(), 10) / 100);
    });
    $('#zoom-fit').on('click', fitCanvasToView);

    // 1. 초기 사이즈 및 배경 설정
    function initCanvas() {
      const w = parseInt($('#canvas-w').val(), 10) || 1800;
      const h = parseInt($('#canvas-h').val(), 10) || 250;

      wrapper.css({
        width: w + 'px',
        height: h + 'px',
        backgroundColor: $('#bg-color').val()
      });

      // 캔버스 크기가 변경되면 배경 이미지 레이어(.movable-image)를 100% 비율로 맞추어 동적이고 선명하게 유지
      const $imgLayer = wrapper.find('.movable-image');
      if ($imgLayer.length) {
        $imgLayer.css({
          left: '0px',
          top: '0px',
          width: '100%',
          height: '100%',
          transform: 'none'
        });
      }

      // 1800 x 250 기본 사이즈 기준 비율로 텍스트 크기 동적 스케일링
      const baseW = 1800;
      const baseH = 250;
      const scaleW = w / baseW;
      const scaleH = h / baseH;
      const scale = Math.min(scaleW, scaleH);

      $('.banner-text').each(function () {
        const $t = $(this);
        // 1. 메인 텍스트 영역 스케일링
        let baseFs = $t.data('base-size');
        if (!baseFs) {
          baseFs = parseInt($t.css('font-size'), 10) || 40;
          $t.data('base-size', baseFs);
        }
        const newFs = Math.max(8, Math.round(baseFs * scale));
        $t.css('font-size', newFs + 'px');

        // 2. 내부 부분 편집용 span 태그들도 비례 스케일링
        $t.find('span').each(function () {
          const $span = $(this);
          let spanBaseFs = $span.data('base-size');
          if (!spanBaseFs) {
            spanBaseFs = parseInt($span.css('font-size'), 10);
            if (!spanBaseFs) return; // 명시적 폰트사이즈가 없는 경우 부모를 따르므로 스킵
            $span.data('base-size', spanBaseFs);
          }
          const newSpanFs = Math.max(8, Math.round(spanBaseFs * scale));
          $span.css('font-size', newSpanFs + 'px');
        });
      });

      makeMovable();
      requestAnimationFrame(scrollStageToCenter);
    }

    // 2. 드래그 가능하게 만들기 (손잡이로만 이동 — 텍스트 영역은 편집/삭제 가능)
    function makeMovable() {
      $(".movable").each(function () {
        const $m = $(this);
        if ($m.data("ui-draggable")) {
          $m.draggable("destroy");
        }
        // 각 코너 및 사이드의 리사이즈 핸들이 없는 경우 자동으로 동적 주입
        if ($m.find('.resize-handle').length === 0) {
          $m.append(`
            <div class="resize-handle resize-handle-nw" data-handle="nw"></div>
            <div class="resize-handle resize-handle-ne" data-handle="ne"></div>
            <div class="resize-handle resize-handle-sw" data-handle="sw"></div>
            <div class="resize-handle resize-handle-se" data-handle="se"></div>
            <div class="resize-handle resize-handle-w" data-handle="w"></div>
            <div class="resize-handle resize-handle-e" data-handle="e"></div>
          `);
        }
        // 회전 핸들이 없는 경우 주입
        if ($m.find('.rotate-handle').length === 0) {
          $m.append(`
            <div class="rotate-handle" title="회전">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
              </svg>
            </div>
          `);
        }
      });
      // jQuery UI draggable 제거하고 커스텀 핸들러 사용하므로 draggable 바인딩부 생략
    }

    // 2-1. 커스텀 마우스 드래그 이동 핸들러 (이동 손잡이 조작 시)
    $(document).on('mousedown', '.movable-handle', function (e) {
      e.preventDefault();
      e.stopPropagation();

      const $handle = $(this);
      const $m = $handle.closest('.movable');

      // 요소 선택 상태 전환
      $('.movable').removeClass('selected');
      $m.addClass('selected');
      syncFontUIFromSelection();

      // transform(특히 translate) 해제 및 절대 좌표(px) 계산 (튐 방지)
      const parentOffset = wrapper.offset();
      const elOffset = $m.offset();
      const startLeft = (elOffset.left - parentOffset.left) / viewZoom;
      const startTop = (elOffset.top - parentOffset.top) / viewZoom;
      const angle = parseFloat($m.attr('data-rotate')) || 0;

      $m.css({
        transform: angle ? `rotate(${angle}deg)` : 'none',
        left: startLeft + 'px',
        top: startTop + 'px',
        right: 'auto',
        bottom: 'auto'
      });

      const startX = e.clientX;
      const startY = e.clientY;

      $(document).on('mousemove.movableDrag', function (moveEvent) {
        const dx = moveEvent.clientX - startX;
        const dy = moveEvent.clientY - startY;

        // 마우스 이동 변위에 줌 배율 역산 적용
        let newLeft = startLeft + dx / viewZoom;
        let newTop = startTop + dy / viewZoom;

        // 캔버스 영역 내 가둠 (Containment)
        const mw = $m.outerWidth();
        const mh = $m.outerHeight();
        const cw = wrapper.outerWidth();
        const ch = wrapper.outerHeight();

        newLeft = Math.max(0, Math.min(cw - mw, newLeft));
        newTop = Math.max(0, Math.min(ch - mh, newTop));

        $m.css({
          left: newLeft + 'px',
          top: newTop + 'px'
        });
      });

      $(document).on('mouseup.movableDrag', function () {
        $(document).off('.movableDrag');
        saveState(); // 드래그 종료 시 상태 저장
      });
    });

    // 2-2. 커스텀 회전 핸들러 (회전 아이콘 조작 시)
    $(document).on('mousedown', '.rotate-handle', function (e) {
      e.preventDefault();
      e.stopPropagation();

      const $handle = $(this);
      const $m = $handle.closest('.movable');

      // 요소 선택 상태 전환
      $('.movable').removeClass('selected');
      $m.addClass('selected');
      syncFontUIFromSelection();

      // transform 해제 및 절대 좌표(px) 계산 (튐 방지)
      const parentOffset = wrapper.offset();
      const elOffset = $m.offset();
      const startLeft = (elOffset.left - parentOffset.left) / viewZoom;
      const startTop = (elOffset.top - parentOffset.top) / viewZoom;
      const startAngle = parseFloat($m.attr('data-rotate')) || 0;

      $m.css({
        transform: startAngle ? `rotate(${startAngle}deg)` : 'none',
        left: startLeft + 'px',
        top: startTop + 'px',
        right: 'auto',
        bottom: 'auto'
      });

      // 요소의 중심점 스크롤 반영 절대 좌표 구하기
      const rect = $m[0].getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      // 마우스 시작 각도 계산 (라디안을 디그리로 변환)
      const startMouseAngle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * 180 / Math.PI;

      $(document).on('mousemove.movableRotate', function (moveEvent) {
        const currentMouseAngle = Math.atan2(moveEvent.clientY - centerY, moveEvent.clientX - centerX) * 180 / Math.PI;
        let angleDiff = currentMouseAngle - startMouseAngle;

        let newAngle = startAngle + angleDiff;

        // Shift 키 누를 시 15도 단위 스냅 지원
        if (moveEvent.shiftKey) {
          newAngle = Math.round(newAngle / 15) * 15;
        }

        // 각도 범위 정규화 (-180 ~ 180도)
        newAngle = (newAngle % 360 + 360) % 360;
        if (newAngle > 180) newAngle -= 360;

        // 소수점 첫째자리까지 반올림 정렬
        newAngle = Math.round(newAngle * 10) / 10;

        $m.css('transform', `rotate(${newAngle}deg)`);
        $m.attr('data-rotate', newAngle);
      });

      $(document).on('mouseup.movableRotate', function () {
        $(document).off('.movableRotate');
        saveState(); // 회전 종료 시 상태 저장
      });
    });

    // 2-3. 리사이즈 핸들 드래그를 통한 크기 및 폰트 사이즈 연동 조절 (Shift 누를 시 정비율)
    $(document).on('mousedown', '.resize-handle', function (e) {
      e.preventDefault();
      e.stopPropagation();

      const $handle = $(this);
      const type = $handle.data('handle'); // nw, ne, sw, se
      const $m = $handle.closest('.movable');
      const $text = $m.find('.banner-text');

      // 리사이즈 전에 transform을 해제하고 절대 좌표(px)로 고정시킵니다. (튐 방지 및 줌 지원)
      const parentOffset = wrapper.offset();
      const elOffset = $m.offset();
      const startLeft = (elOffset.left - parentOffset.left) / viewZoom;
      const startTop = (elOffset.top - parentOffset.top) / viewZoom;
      const angle = parseFloat($m.attr('data-rotate')) || 0;

      $m.css({
        transform: angle ? `rotate(${angle}deg)` : 'none',
        left: startLeft + 'px',
        top: startTop + 'px',
        right: 'auto',
        bottom: 'auto'
      });

      const startX = e.clientX;
      const startY = e.clientY;
      const startWidth = $m.outerWidth();
      const startHeight = $m.outerHeight();
      const startFontSize = $text.length ? (parseFloat($text.css('font-size')) || 40) : null;

      const isShift = e.shiftKey;

      $(document).on('mousemove.textResize', function (moveEvent) {
        // 마우스 이동 변위 계산 시 줌 비율 보정 적용
        const dx = (moveEvent.clientX - startX) / viewZoom;
        const dy = (moveEvent.clientY - startY) / viewZoom;

        let newWidth = startWidth;
        let newHeight = startHeight;
        let newLeft = startLeft;
        let newTop = startTop;

        // 핸들 유형에 따른 좌표 계산 (사이드 핸들 e, w 포함)
        if (type === 'se') {
          newWidth = startWidth + dx;
          newHeight = startHeight + dy;
        } else if (type === 'sw') {
          newWidth = startWidth - dx;
          newHeight = startHeight + dy;
          newLeft = startLeft + dx;
        } else if (type === 'ne') {
          newWidth = startWidth + dx;
          newHeight = startHeight - dy;
          newTop = startTop + dy;
        } else if (type === 'nw') {
          newWidth = startWidth - dx;
          newHeight = startHeight - dy;
          newLeft = startLeft + dx;
          newTop = startTop + dy;
        } else if (type === 'e') {
          newWidth = startWidth + dx;
        } else if (type === 'w') {
          newWidth = startWidth - dx;
          newLeft = startLeft + dx;
        }

        newWidth = Math.max(50, newWidth);
        newHeight = Math.max(20, newHeight);

        // shiftKey 여부에 따라 정비율 스케일링 활성화
        const useProportional = moveEvent.shiftKey || isShift;
        let scale = 1;

        if (useProportional && type !== 'e' && type !== 'w') {
          const scaleX = newWidth / startWidth;
          const scaleY = newHeight / startHeight;
          // 가로 세로 이동 변위가 큰 축 기준으로 균등 정비율을 계산
          scale = Math.abs(dx) > Math.abs(dy) ? scaleX : scaleY;

          newWidth = startWidth * scale;
          newHeight = startHeight * scale;

          if (type === 'sw') {
            newLeft = startLeft + (startWidth - newWidth);
          } else if (type === 'ne') {
            newTop = startTop + (startHeight - newHeight);
          } else if (type === 'nw') {
            newLeft = startLeft + (startWidth - newWidth);
            newTop = startTop + (startHeight - newHeight);
          }
        } else {
          scale = newWidth / startWidth;
        }

        if (startFontSize !== null) {
          const newFontSize = Math.max(8, Math.min(180, Math.round(startFontSize * scale)));
          // 텍스트 박스 박스 크기 및 위치 반영
          $m.css({
            width: newWidth + 'px',
            left: newLeft + 'px',
            top: newTop + 'px'
          });
          // 실시간 폰트 크기 변경 호출 (UI 동기화 및 base-size 보정)
          applyFontSize(newFontSize);
        } else {
          // 이미지 레이어는 width와 height 모두 강제 갱신
          $m.css({
            width: newWidth + 'px',
            height: newHeight + 'px',
            left: newLeft + 'px',
            top: newTop + 'px'
          });
        }
      });

      $(document).on('mouseup.textResize', function () {
        $(document).off('.textResize');
        syncFontUIFromSelection();
        saveState(); // 리사이즈 종료 시 히스토리 기록
      });
    });

    // 텍스트 박스 선택(손잡이 클릭) 후 Delete/Backspace로 전체 삭제 — 편집 중(contenteditable)일 때는 글자만 삭제
    $(document).on('mousedown', '#canvas-wrapper .movable-handle', function () {
      $('.movable').removeClass('selected');
      $(this).closest('.movable').addClass('selected');
      syncFontUIFromSelection();
    });
    $(document).on('mousedown', '#canvas-wrapper .banner-text', function () {
      $('.movable').removeClass('selected');
      $(this).closest('.movable').addClass('selected');
      syncFontUIFromSelection();
    });
    $(document).on('mousedown', '#canvas-wrapper .movable-image .movable-image-src, #canvas-wrapper .movable-image img', function () {
      $('.movable').removeClass('selected');
      $(this).closest('.movable').addClass('selected');
      syncFontUIFromSelection();
    });
    $(document).on('mousedown', '#canvas-wrapper', function (e) {
      if (!$(e.target).closest('.movable').length) {
        $('.movable').removeClass('selected');
      }
    });

    // 텍스트 블록 글씨 직접 편집 종료(포커스 해제) 시 히스토리 자동 기록
    $(document).on('blur', '#canvas-wrapper .banner-text', function () {
      saveState();
    });
    $(document).on('keydown', function (e) {
      if (e.key !== 'Delete' && e.key !== 'Backspace') return;
      const active = document.activeElement;
      if (active) {
        if (active.closest && active.closest('#sidebar')) return;
        const tag = active.tagName;
        if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA' || tag === 'BUTTON') return;
        if (active.isContentEditable && $(active).closest('.banner-text').length) return;
      }
      const $sel = $('#canvas-wrapper .movable.selected');
      if (!$sel.length) return;
      e.preventDefault();
      $sel.remove();
      makeMovable();
      saveState(); // 요소 삭제 시 히스토리 기록
    });

    // 2-2. 단축키 및 마우스 휠을 통한 폰트 크기 확대/축소 연동
    $(document).on('keydown', function (e) {
      // Alt + Up Arrow 또는 Alt + Down Arrow 단축키 연동
      if (e.altKey && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
        const $sel = $('#canvas-wrapper .movable.selected');
        if ($sel.length) {
          e.preventDefault();
          const delta = e.key === 'ArrowUp' ? 5 : -5;
          adjustSelectedFontSize(delta);
        }
      }

      // Ctrl + Z 실행 취소 단축키 연동
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
        undo();
      }

      // Ctrl + Y 또는 Ctrl + Shift + Z 다시 실행 단축키 연동
      if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) {
        e.preventDefault();
        redo();
      }
    });

    $(document).on('wheel', '#canvas-wrapper .movable.selected', function (e) {
      // Alt + 마우스 휠 스크롤 연동
      if (e.altKey) {
        e.preventDefault();
        const delta = e.originalEvent.deltaY < 0 ? 3 : -3;
        adjustSelectedFontSize(delta);
      }
    });

    // 3. 실시간 속성 변경
    $('#canvas-w, #canvas-h').on('input', function () {
      const w = $('#canvas-w').val();
      const h = $('#canvas-h').val();
      const presetVal = `${w}x${h}`;
      if ($(`#canvas-size-preset option[value="${presetVal}"]`).length > 0) {
        $('#canvas-size-preset').val(presetVal);
      } else {
        $('#canvas-size-preset').val('custom');
      }
      initCanvas();
    });
    $('#canvas-w, #canvas-h').on('change', function () {
      saveState();
    });
    $('#canvas-size-preset').on('change', function () {
      const val = $(this).val();
      if (val !== 'custom') {
        const parts = val.split('x');
        $('#canvas-w').val(parts[0]);
        $('#canvas-h').val(parts[1]);
        initCanvas();
        saveState();
        fitCanvasToView();
      }
    });
    $('#bg-color').on('input', function () {
      wrapper.css('background-image', 'none');
      wrapper.css('background-color', $(this).val());
    });
    $('#bg-color').on('change', function () {
      saveState();
    });

    // 4. 배경 이미지 업로드 (선택 및 리사이즈 가능한 프리미엄 이미지 레이어로 변경)
    $('#bg-upload').on('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (event) {
        // 기존 배경 이미지 레이어가 있는지 확인
        let $imgLayer = wrapper.find('.movable-image');
        if ($imgLayer.length) {
          const $srcEl = $imgLayer.find('.movable-image-src');
          if ($srcEl.length) {
            $srcEl.css('background-image', `url("${event.target.result}")`);
          } else {
            $imgLayer.find('img').attr('src', event.target.result);
          }
          // 규격 템플릿 크기에 맞춰 강제 크기 리사이징 및 위치 초기화
          $imgLayer.css({
            left: '0px',
            top: '0px',
            width: '100%',
            height: '100%',
            transform: 'none'
          });
        } else {
          // 없으면 새로 생성하여 캔버스 가장 아래(prepend)에 삽입
          // html2canvas의 object-fit 미지원 한계를 완벽하게 우회하기 위해 CSS background-size: cover를 적용한 div 방식으로 변경
          $imgLayer = $(`
                        <div class="movable movable-image" style="top: 0px; left: 0px; width: 100%; height: 100%; z-index: 1;">
                            <span class="movable-handle" title="드래그하여 이동">⋮⋮ 이동</span>
                            <div class="movable-image-src" style="width: 100%; height: 100%; background-size: cover; background-position: center; display: block;"></div>
                        </div>
                    `);
          $imgLayer.find('.movable-image-src').css('background-image', `url("${event.target.result}")`);
          wrapper.prepend($imgLayer);
        }

        // 모든 요소를 활성화하고 선택 상태로 만듦
        makeMovable();
        $('.movable').removeClass('selected');
        $imgLayer.addClass('selected');

        // 투명도 조절바 초기값 설정 및 노출
        const $targetImg = $imgLayer.find('.movable-image-src, img');
        const op = parseFloat($targetImg.css('opacity'));
        const opVal = Number.isFinite(op) ? Math.round(op * 100) : 100;
        $('#bg-opacity').val(opVal);
        $('#bg-opacity-label').text(opVal + '%');
        $('#bg-opacity-control').show();

        // 기존 wrapper 자체의 background-image는 제거 (레이어와 충돌 방지)
        wrapper.css('background-image', 'none');

        saveState();
      };
      reader.readAsDataURL(file);
    });

    $('#bg-remove').on('click', function () {
      wrapper.find('.movable-image').remove();
      wrapper.css('background-image', 'none');
      wrapper.css('background-color', $('#bg-color').val());
      $('#bg-upload').val('');
      $('#bg-opacity-control').hide();
      saveState();
    });

    // 4-2. 배경 이미지 투명도 조절기 핸들러
    $('#bg-opacity').on('input', function () {
      const val = $(this).val();
      wrapper.find('.movable-image-src, .movable-image img').css('opacity', val / 100);
      $('#bg-opacity-label').text(val + '%');
    });

    $('#bg-opacity').on('change', function () {
      saveState();
    });

    // 5. 텍스트 요소 동적 추가
    function addText(str, size, weight) {
      const w = parseInt($('#canvas-w').val(), 10) || 1800;
      const h = parseInt($('#canvas-h').val(), 10) || 250;
      const scale = Math.min(w / 1800, h / 250);
      const baseSize = Math.round(size / scale);

      const newText = $(`
                <div class="movable" style="top: 50%; left: 50%; transform: translate(-50%, -50%);">
                    <span class="movable-handle" title="드래그하여 이동">⋮⋮</span>
                    <div class="banner-text" contenteditable="true" data-base-size="${baseSize}"
                         style="font-size: ${size}px; font-weight: ${weight}; font-family: ${$('#font-select').val()}; color: ${$('#font-color').val()};">
                        ${str}
                    </div>
                </div>
            `);
      wrapper.append(newText);
      makeMovable();

      // Auto select new text
      $('.movable').removeClass('selected');
      newText.addClass('selected');
      syncFontUIFromSelection();

      // 텍스트 추가 완료 후 상태 저장
      saveState();
    }

    // 드래그된 특정 선택 영역 또는 전체 박스에 CSS 스타일을 부여하는 핵심 유틸리티
    function applyStyleToSelection(styleName, styleValue) {
      const selection = window.getSelection();
      if (!selection.rangeCount) {
        const $t = getSelectedBannerText();
        if ($t) $t.css(styleName, styleValue);
        return;
      }

      const range = selection.getRangeAt(0);

      // 만약 텍스트를 드래그해서 블록 지정하지 않은 경우(커서만 있거나 선택 해제 시) 전체 박스에 적용
      if (range.collapsed) {
        const $t = getSelectedBannerText();
        if ($t) {
          $t.css(styleName, styleValue);
        }
        return;
      }

      const $t = getSelectedBannerText();
      if (!$t) return;
      const container = $t[0];

      // 드래그 영역이 현재 텍스트 편집 상자 내부인지 검증
      if (!container.contains(range.commonAncestorContainer)) {
        return;
      }

      const span = document.createElement('span');
      span.style[styleName] = styleValue;

      try {
        const fragment = range.extractContents();
        span.appendChild(fragment);
        range.insertNode(span);

        // 드래그 영역 복구
        selection.removeAllRanges();
        const newRange = document.createRange();
        newRange.selectNodeContents(span);
        selection.addRange(newRange);
      } catch (err) {
        console.error("Style selection range failed:", err);
      }
    }

    function rgbToHex(rgb) {
      const rgbMatch = rgb.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*\d+(?:\.\d+)?)?\)$/);
      if (!rgbMatch) return null;
      const r = parseInt(rgbMatch[1], 10);
      const g = parseInt(rgbMatch[2], 10);
      const b = parseInt(rgbMatch[3], 10);
      return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
    }

    function syncFontUIFromSelection() {
      const $t = getSelectedBannerText();
      if (!$t) return;

      // 1. Sync font family
      const ff = $t.css('font-family');
      if (ff) {
        $('#font-select option').each(function () {
          const optVal = $(this).val();
          const cleanOpt = optVal.replace(/['"]/g, '').trim().toLowerCase();
          const cleanFF = ff.replace(/['"]/g, '').trim().toLowerCase();
          if (cleanFF.includes(cleanOpt) || cleanOpt.includes(cleanFF)) {
            $('#font-select').val(optVal);
            return false;
          }
        });
      }

      // 2. Sync font size
      const fs = parseInt(($t.css('font-size') || '0').toString(), 10);
      if (Number.isFinite(fs) && fs > 0) {
        $('#font-size-range').val(fs);
        $('#font-size-num').val(fs);
      }

      // 3. Sync font weight
      let fwVal = ($t.css('font-weight') || '400').toString();
      if (fwVal === 'normal') fwVal = '400';
      else if (fwVal === 'bold') fwVal = '700';
      const fw = parseInt(fwVal, 10);
      if (Number.isFinite(fw) && fw > 0) {
        $('#font-weight-range').val(fw);
        $('#font-weight-select').val(fw);
      }

      // 4. Sync font color
      const color = $t.css('color');
      if (color) {
        const hexColor = rgbToHex(color);
        if (hexColor) {
          $('#font-color').val(hexColor);
        }
      }
    }

    function applyFontSize(px) {
      const size = Math.max(8, Math.min(180, parseInt(px, 10) || 0));
      if (!size) return;

      const selection = window.getSelection();
      const range = selection.rangeCount ? selection.getRangeAt(0) : null;

      if (range && !range.collapsed) {
        // 선택 영역(드래그)이 있는 경우 선택 부분만 스타일 적용
        applyStyleToSelection('font-size', size + 'px');

        // 적용한 span을 찾아서 base-size 속성을 부여합니다. (가변 반응형 스케일 대응)
        const $span = $(range.commonAncestorContainer).closest('span');
        if ($span.length) {
          const w = parseInt($('#canvas-w').val(), 10) || 1800;
          const h = parseInt($('#canvas-h').val(), 10) || 250;
          const scale = Math.min(w / 1800, h / 250);
          $span.data('base-size', Math.round(size / scale));
        }
      } else {
        // 드래그가 없는 경우 전체 텍스트 상자에 적용
        const $t = getSelectedBannerText();
        if ($t) {
          $t.css('font-size', size + 'px');
          const w = parseInt($('#canvas-w').val(), 10) || 1800;
          const h = parseInt($('#canvas-h').val(), 10) || 250;
          const scale = Math.min(w / 1800, h / 250);
          $t.data('base-size', Math.round(size / scale));
        }
      }

      $('#font-size-range').val(size);
      $('#font-size-num').val(size);
    }

    function alignSelectedMovable(direction) {
      const $sel = $('#canvas-wrapper .movable.selected');
      if (!$sel.length) return;

      const cw = wrapper.outerWidth();
      const ch = wrapper.outerHeight();
      const mw = $sel.outerWidth();
      const mh = $sel.outerHeight();

      const currentLeft = parseFloat($sel.css('left')) || 0;
      const currentTop = parseFloat($sel.css('top')) || 0;

      let left = currentLeft;
      let top = currentTop;

      // transform이 적용된 경우(퍼센트 배치 템플릿 포함) 절대 좌표(px)로 고정
      const tf = $sel.css('transform');
      if (tf && tf !== 'none') {
        const pos = $sel.position();
        left = pos.left;
        top = pos.top;
      }

      switch (direction) {
        case 'left':
          left = 0;
          break;
        case 'hcenter':
          left = Math.max(0, Math.round((cw - mw) / 2));
          break;
        case 'right':
          left = Math.max(0, Math.round(cw - mw));
          break;
        case 'top':
          top = 0;
          break;
        case 'vcenter':
          top = Math.max(0, Math.round((ch - mh) / 2));
          break;
        case 'bottom':
          top = Math.max(0, Math.round(ch - mh));
          break;
        case 'center':
          left = Math.max(0, Math.round((cw - mw) / 2));
          top = Math.max(0, Math.round((ch - mh) / 2));
          break;
      }

      $sel.css({
        top: top + 'px',
        left: left + 'px',
        transform: 'none',
        right: 'auto',
        bottom: 'auto'
      });
      makeMovable();
      saveState(); // 정렬 완료 후 상태 저장
    }

    function applyBackgroundImage(src) {
      if (!src) return;

      // 1. 기존 배경 이미지(.movable-image)가 있다면 찾아서 업데이트 및 100% 리사이즈
      let $imgLayer = wrapper.find('.movable-image');
      if ($imgLayer.length) {
        const $srcEl = $imgLayer.find('.movable-image-src');
        if ($srcEl.length) {
          $srcEl.css('background-image', `url("${src}")`);
        } else {
          $imgLayer.find('img').attr('src', src);
        }
        // 규격 템플릿 크기에 맞춰 강제 크기 리사이징 및 위치 초기화
        $imgLayer.css({
          left: '0px',
          top: '0px',
          width: '100%',
          height: '100%',
          transform: 'none'
        });
      } else {
        // 없다면 새로 엘리먼트를 만들어 캔버스 맨 뒤(prepend)에 추가
        $imgLayer = $(`
          <div class="movable movable-image" style="top: 0px; left: 0px; width: 100%; height: 100%; z-index: 1;">
              <span class="movable-handle" title="드래그하여 이동">⋮⋮ 이동</span>
              <div class="movable-image-src" style="width: 100%; height: 100%; background-size: cover; background-position: center; display: block;"></div>
          </div>
        `);
        $imgLayer.find('.movable-image-src').css('background-image', `url("${src}")`);
        wrapper.prepend($imgLayer);
      }

      // 2. 드래그/리사이즈 바인딩 다시 활성화
      makeMovable();
      $('.movable').removeClass('selected');
      $imgLayer.addClass('selected');

      // 3. 투명도 조절기 및 기타 UI 동기화
      const $targetImg = $imgLayer.find('.movable-image-src, img');
      const op = parseFloat($targetImg.css('opacity'));
      const opVal = Number.isFinite(op) ? Math.round(op * 100) : 100;
      $('#bg-opacity').val(opVal);
      $('#bg-opacity-label').text(opVal + '%');
      $('#bg-opacity-control').show();

      // 4. 캔버스 자체의 배경 이미지는 지우고 배경색 투명화 (충돌 방지)
      wrapper.css('background-image', 'none');

      // 5. 프리셋 목록 active 테두리 갱신
      $('.bg-preset-card').removeClass('active');
      $(`.bg-preset-card`).each(function () {
        if ($(this).attr('data-url') === src) {
          $(this).addClass('active');
        }
      });

      saveState();
    }

    function saveCurrentBgAsTemplate() {
      // 1. 현재 적용된 배경 이미지 URL 추출
      let bgSrc = "";
      const $imgLayer = wrapper.find('.movable-image');

      if ($imgLayer.length) {
        const bgVal = $imgLayer.find('.movable-image-src').css('background-image') || "";
        const match = bgVal.match(/^url\(['"]?(.+?)['"]?\)$/);
        if (match) {
          bgSrc = match[1];
        }
      } else {
        const bgVal = wrapper.css('background-image') || "";
        const match = bgVal.match(/^url\(['"]?(.+?)['"]?\)$/);
        if (match) {
          bgSrc = match[1];
        }
      }

      if (!bgSrc || bgSrc === 'none' || bgSrc.startsWith('linear-gradient') || bgSrc.startsWith('radial-gradient')) {
        alert('보관함에 저장할 배경 이미지가 없습니다.\n먼저 배경 이미지를 업로드하거나 선택해 주세요.');
        return;
      }

      // 2. 이름 입력받기
      let name = prompt('저장할 배경 이미지의 이름을 입력하세요:', `마이 배경_${new Date().toLocaleDateString('ko-KR')}`);
      if (name === null) return; // 취소
      name = name.trim();
      if (!name) name = `저장된 배경_${Date.now()}`;

      // 3. Base64 데이터가 너무 커서 로컬스토리지 초과 방지를 위해 downscale 처리 진행
      if (bgSrc.startsWith('data:image')) {
        const img = new Image();
        img.onload = function () {
          const maxDim = 800;
          let w = img.width;
          let h = img.height;
          if (w > maxDim || h > maxDim) {
            if (w > h) {
              h = Math.round(h * maxDim / w);
              w = maxDim;
            } else {
              w = Math.round(w * maxDim / h);
              h = maxDim;
            }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          const compressedBase64 = canvas.toDataURL('image/jpeg', 0.8);

          saveBgToLocalStorage(name, compressedBase64);
        };
        img.src = bgSrc;
      } else {
        // 일반 URL (예: Unsplash)은 그냥 저장
        saveBgToLocalStorage(name, bgSrc);
      }
    }

    function saveBgToLocalStorage(name, src) {
      let savedBgs = [];
      try {
        const raw = localStorage.getItem(LOCAL_STORAGE_BG_KEY);
        if (raw) savedBgs = JSON.parse(raw);
      } catch (e) {
        console.error(e);
      }

      const item = {
        id: 'custom_bg_' + Date.now(),
        name: name,
        url: src,
        timestamp: Date.now()
      };

      savedBgs.push(item);
      try {
        localStorage.setItem(LOCAL_STORAGE_BG_KEY, JSON.stringify(savedBgs));
        loadCustomBgTemplates();
        alert(`"${name}" 배경 이미지가 보관함에 안전하게 저장되었습니다!`);
      } catch (quotaError) {
        console.error(quotaError);
        alert('로컬 저장 공간이 부족하여 배경 이미지를 저장할 수 없습니다.\n불필요한 보관 배경을 삭제한 후 다시 시도해 주세요.');
      }
    }

    function loadCustomBgTemplates() {
      let savedBgs = [];
      try {
        const raw = localStorage.getItem(LOCAL_STORAGE_BG_KEY);
        if (raw) savedBgs = JSON.parse(raw);
      } catch (e) {
        console.error(e);
      }

      const $customSection = $('#custom-bg-section');
      const $customGrid = $('#bg-custom-list');
      $customGrid.empty();

      if (savedBgs.length === 0) {
        $customSection.hide();
        return;
      }

      // 최신 저장된 순 정렬
      savedBgs.sort((a, b) => b.timestamp - a.timestamp);

      savedBgs.forEach(bg => {
        const $card = $(`
          <div class="bg-preset-card" data-url="${bg.url}" style="background-image: url('${bg.url}');" onclick="applyBackgroundImage('${bg.url}')" title="${bg.name}">

        `);
        $customGrid.append($card);
      });

      $customSection.show();
    }

    function deleteCustomBgTemplate(event, id) {
      event.preventDefault();
      event.stopPropagation();

      let savedBgs = [];
      try {
        const raw = localStorage.getItem(LOCAL_STORAGE_BG_KEY);
        if (raw) savedBgs = JSON.parse(raw);
      } catch (e) {
        console.error(e);
      }

      const index = savedBgs.findIndex(bg => bg.id === id);
      if (index === -1) return;

      const name = savedBgs[index].name;
      if (!confirm(`"${name}" 배경 이미지를 보관함에서 삭제하시겠습니까?`)) return;

      savedBgs.splice(index, 1);
      localStorage.setItem(LOCAL_STORAGE_BG_KEY, JSON.stringify(savedBgs));
      loadCustomBgTemplates();
    }

    function clearCustomBgTemplates() {

      const tmpl = BANNER_TEMPLATES[key];
      if (!tmpl) return;

      // 1. 기존 텍스트 박스 및 배경 이미지 제거
      $('#canvas-wrapper .movable').remove();

      // 2. 기본 사이즈(1800 x 250) 설정 및 입력 필드 반영
      $('#canvas-w').val(1800);
      $('#canvas-h').val(250);

      // 3. 배경색 및 이미지 설정
      $('#bg-color').val(tmpl.backgroundColor);

      const isImgUrl = tmpl.backgroundImage &&
        (tmpl.backgroundImage.startsWith('http') ||
          tmpl.backgroundImage.startsWith('data:image') ||
          tmpl.backgroundImage.includes('.jpg') ||
          tmpl.backgroundImage.includes('.png') ||
          tmpl.backgroundImage.includes('assets/'));

      if (isImgUrl) {
        wrapper.css('background-image', 'none');
        wrapper.css('background-color', tmpl.backgroundColor);

        const $imgLayer = $(`
          <div class="movable movable-image" style="top: 0px; left: 0px; width: 100%; height: 100%; z-index: 1;">
              <span class="movable-handle" title="드래그하여 이동">⋮⋮ 이동</span>
              <div class="movable-image-src" style="width: 100%; height: 100%; background-size: cover; background-position: center; display: block;"></div>
          </div>
        `);
        $imgLayer.find('.movable-image-src').css('background-image', `url("${tmpl.backgroundImage}")`);
        wrapper.prepend($imgLayer);

        // 투명도 표시
        $('#bg-opacity').val(100);
        $('#bg-opacity-label').text('100%');
        $('#bg-opacity-control').show();
      } else {
        wrapper.css('background-image', tmpl.backgroundImage);
        wrapper.css('background-color', tmpl.backgroundColor);
        $('#bg-opacity-control').hide();
      }

      // 4. 기본 폰트 컬러 설정
      $('#font-color').val(tmpl.fontColor);

      // 5. 텍스트 요소들 생성
      tmpl.texts.forEach(function (t) {
        const baseSize = t.size;
        const newText = $(`
                    <div class="movable" style="top: ${t.top}; left: ${t.left}; transform: ${t.transform || 'none'};">
                        <span class="movable-handle" title="드래그하여 이동">⋮⋮</span>
                        <div class="banner-text" contenteditable="true" data-base-size="${baseSize}"
                             style="font-size: ${t.size}px; font-weight: ${t.weight}; font-family: ${t.fontFamily}; color: ${t.color}; text-shadow: ${t.textShadow || 'none'};${t.nowrap ? ' white-space: nowrap;' : ''}">
                            ${t.text}
                        </div>
                    </div>
                `);
        wrapper.append(newText);
      });

      // 6. UI Active 클래스 갱신
      $('.template-card').removeClass('active');
      $(`[onclick="applyTemplate('${key}')"]`).addClass('active');

      // 7. 배경 템플릿 목록 active 테두리 갱신
      $('.bg-preset-card').removeClass('active');
      if (isImgUrl) {
        $(`.bg-preset-card`).each(function () {
          if ($(this).attr('data-url') === tmpl.backgroundImage) {
            $(this).addClass('active');
          }
        });
      }

      // 8. 캔버스 상태 갱신 및 스크롤, 뷰 맞춤
      initCanvas();
      fitCanvasToView();

      // 9. 히스토리 상태 기록
      saveState();
    }

    // 8. JPG 내보내기 — 고해상도 캡처 후 설정 픽셀(W×H)로 리샘플 (선명도·색 어긋남 완화)
    function exportCanvasJPG() {
      const canvasArea = document.getElementById('canvas-wrapper');
      const w = parseInt($('#canvas-w').val(), 10) || 1280;
      const h = parseInt($('#canvas-h').val(), 10) || 720;
      $('.movable').css('border', 'none');
      const savedZoom = viewZoom;
      canvasScaleWrap.css('zoom', 1);

      function captureScale() {
        // 기본 캡처 배율을 3.0배로 높여 디테일을 정밀하게 수집
        let s = 3.0;
        const maxPx = 12000;
        if (Math.max(w, h) * s > maxPx) {
          s = maxPx / Math.max(w, h);
        }
        return Math.max(1.5, s);
      }

      function runHtml2Canvas() {
        return html2canvas(canvasArea, {
          scale: captureScale(),
          useCORS: true,
          allowTaint: true,
          backgroundColor: null,
          logging: false,
          imageTimeout: 15000,
          onclone: function (clonedDoc) {
            const el = clonedDoc.getElementById('canvas-wrapper');
            if (el) {
              el.style.boxShadow = 'none';
              el.style.outline = 'none';
            }
            // 캡처 이미지에서 UI 선택박스, 조절점, 드래그 핸들 숨김 처리
            $(clonedDoc).find('.movable-handle, .resize-handle').css('display', 'none');
            $(clonedDoc).find('.movable').css({
              'border': 'none',
              'outline': 'none',
              'box-shadow': 'none'
            }).removeClass('selected');
          },
        });
      }

      const fontWait = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
      fontWait.then(runHtml2Canvas).then(function (srcCanvas) {
        // 1. 단계적 다운스케일링(Step-down Scaling)으로 뭉개짐(Blur) 현상 방지
        let currentCanvas = srcCanvas;
        let currentW = srcCanvas.width;
        let currentH = srcCanvas.height;

        while (currentW > w * 2 && currentH > h * 2) {
          const nextW = Math.round(currentW / 2);
          const nextH = Math.round(currentH / 2);
          const tempCanvas = document.createElement('canvas');
          tempCanvas.width = nextW;
          tempCanvas.height = nextH;
          const tempCtx = tempCanvas.getContext('2d');
          tempCtx.imageSmoothingEnabled = true;
          tempCtx.imageSmoothingQuality = 'high';
          tempCtx.drawImage(currentCanvas, 0, 0, currentW, currentH, 0, 0, nextW, nextH);
          currentCanvas = tempCanvas;
          currentW = nextW;
          currentH = nextH;
        }

        const out = document.createElement('canvas');
        out.width = w;
        out.height = h;
        const ctx = out.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(currentCanvas, 0, 0, currentW, currentH, 0, 0, w, h);

        // 2. 쨍하고 선명한(Crisp/Sharp) 이미지를 위한 선명도(Sharpen) 콘볼루션 필터 적용
        try {
          const imgData = ctx.getImageData(0, 0, w, h);
          const data = imgData.data;
          const weights = [
            0, -0.1, 0,
            -0.1, 1.4, -0.1,
            0, -0.1, 0
          ];
          const side = Math.round(Math.sqrt(weights.length));
          const halfSide = Math.floor(side / 2);
          const output = ctx.createImageData(w, h);
          const dst = output.data;

          for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
              const sy = y;
              const sx = x;
              const dstOff = (y * w + x) * 4;
              let r = 0, g = 0, b = 0;
              for (let cy = 0; cy < side; cy++) {
                for (let cx = 0; cx < side; cx++) {
                  const scy = Math.min(h - 1, Math.max(0, sy + cy - halfSide));
                  const scx = Math.min(w - 1, Math.max(0, sx + cx - halfSide));
                  const srcOff = (scy * w + scx) * 4;
                  const wt = weights[cy * side + cx];
                  r += data[srcOff] * wt;
                  g += data[srcOff + 1] * wt;
                  b += data[srcOff + 2] * wt;
                }
              }
              dst[dstOff] = Math.min(255, Math.max(0, r));
              dst[dstOff + 1] = Math.min(255, Math.max(0, g));
              dst[dstOff + 2] = Math.min(255, Math.max(0, b));
              dst[dstOff + 3] = data[dstOff + 3];
            }
          }
          ctx.putImageData(output, 0, 0);
        } catch (e) {
          console.warn("Sharpen filter skipped:", e);
        }

        // 3. 파일 다운로드 처리 (품질 0.92 -> 0.98 상향 조정)
        const link = document.createElement('a');
        link.download = `banner_${w}x${h}_${Date.now()}.jpg`;
        link.href = out.toDataURL('image/jpeg', 0.98);
        link.click();
      }).catch(function (err) {
        console.error(err);
      }).finally(function () {
        canvasScaleWrap.css('zoom', savedZoom);
        $('.movable').css('border', '');
      });
    }

    // 초기화 실행 (스테이지는 줌 적용 후 한 번 더 가운데 스크롤)
    renderPresetList();
    loadCustomBgTemplates();
    applyTemplate('modernNotice');
    updateLocalSavedList();
  </script>
</body>
